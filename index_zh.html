*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0a1a;color:#e2e8f0;min-height:100vh;padding:16px}
.container{max-width:1400px;margin:0 auto}
h1{font-size:1.6rem;color:#00d4ff;text-align:center;margin-bottom:4px}
h2{font-size:1.1rem;color:#00d4ff;margin:16px 0 8px;border-bottom:1px solid #252555;padding-bottom:4px}

.krw-bar span.label{color:#94a3b8}
.krw-bar span.val{color:#00d4ff;font-weight:700;font-variant-numeric:tabular-nums}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px}

.card .lbl{color:#94a3b8;font-size:.78rem;margin-bottom:4px}
.card .val{font-size:1.5rem;font-weight:700;font-variant-numeric:tabular-nums}
.card .sub{font-size:.78rem;color:#94a3b8;margin-top:2px}
.card .sub .up{color:#10b981}.card .sub .down{color:#ef4444}
.chart-wrap{background:#141432;border:1px solid #252555;border-radius:8px;padding:14px;margin-bottom:16px;position:relative}
.chart-wrap canvas{width:100%!important}
table{width:100%;border-collapse:collapse;font-size:.82rem;font-variant-numeric:tabular-nums}
th{background:#1a1a3a;color:#00d4ff;padding:8px 6px;text-align:right;border-bottom:2px solid #252555;white-space:nowrap}
th:first-child{text-align:left}
td{padding:6px;text-align:right;border-bottom:1px solid #25255520}
td:first-child{text-align:left;color:#e2e8f0}
.mom-up{color:#10b981}.mom-down{color:#ef4444}
.analysis-section{background:#141432;border:1px solid #252555;border-radius:8px;padding:14px;margin-bottom:16px}
.analysis-section h3{color:#00d4ff;font-size:.95rem;margin-bottom:8px}
.analysis-section ul{list-style:none;padding:0}
.analysis-section li{padding:6px 0;border-bottom:1px solid #25255530;font-size:.85rem;line-height:1.5}
.analysis-section li:last-child{border-bottom:none}
.tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.72rem;font-weight:600;margin-right:4px}
.tag-high{background:#10b98130;color:#10b981}
.tag-low{background:#ef444430;color:#ef4444}
.tag-event{background:#7c3aed30;color:#7c3aed}
.tag-warn{background:#f59e0b30;color:#f59e0b}
.tag-bm{background:#06b6d430;color:#06b6d4}
.trend-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.trend-card{background:#141432;border:1px solid #252555;border-radius:8px;padding:14px;font-size:.85rem;line-height:1.6}
.trend-card h4{color:#00d4ff;font-size:.9rem;margin-bottom:6px}
.action-section{background:#141432;border:1px solid #252555;border-radius:8px;padding:14px;margin-bottom:16px}
.action-section h3{color:#00d4ff;font-size:.95rem;margin-bottom:8px}
.action-section ul{list-style:none;padding:0}
.action-section li{padding:8px 0;border-bottom:1px solid #25255530;font-size:.85rem;line-height:1.6}
.action-section li:last-child{border-bottom:none}
.jp-share-bar{height:18px;border-radius:4px;background:#252555;overflow:hidden;display:flex;margin:4px 0 2px}
.jp-share-bar div{height:100%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
.jp-s{background:#7c3aed}.gl-s{background:#00d4ff50}
.footer{text-align:center;color:#475569;font-size:.75rem;padding:16px 0}
@media(max-width:640px){h1{font-size:1.2rem}.cards{grid-template-columns:1fr 1fr}.card .val{font-size:1.1rem}}

.spike-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.spike-tab{background:#141432;color:#a0a0c0;border:1px solid #252555;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.85rem;transition:all 0.2s}
.spike-tab:hover{background:#252555;color:#e0e0ff}
.spike-tab.active{background:#7c3aed;color:#fff;border-color:#7c3aed}
.spike-table{width:100%;border-collapse:collapse;font-size:0.85rem}
.spike-table th{background:#141432;color:#00d4ff;padding:8px 10px;text-align:left;border-bottom:2px solid #252555;position:sticky;top:0}
.spike-table td{padding:6px 10px;border-bottom:1px solid #25255520}
.spike-table tr:hover{background:#25255530}
.baseline-insight{margin-top:16px;padding:12px;background:#141432;border:1px solid #252555;border-radius:8px}
.baseline-insight p{margin:6px 0;line-height:1.6}

/* ===== BM Section Styles ===== */
.bm-panel{background:#0d1f2d;border:1px solid #06b6d430;border-radius:10px;padding:16px;margin-bottom:16px}
.bm-panel h3{color:#06b6d4;font-size:.95rem;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.bm-peak{background:#141432;border:1px solid #252555;border-radius:8px;padding:12px 14px;margin-bottom:8px;position:relative;overflow:hidden}
.bm-peak::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.bm-peak.major::before{background:#7c3aed}
.bm-peak.minor::before{background:#00d4ff}
.bm-peak.seasonal::before{background:#10b981}
.bm-peak .peak-date{font-size:.75rem;color:#94a3b8;margin-bottom:2px}
.bm-peak .peak-title{font-size:.95rem;font-weight:700;color:#e2e8f0;margin-bottom:6px}
.bm-peak .peak-metrics{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.bm-peak .metric{font-size:.8rem}
.bm-peak .metric b{color:#00d4ff}
.bm-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.bm-tag{font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:600}
.bm-tag-gacha{background:#ec489920;color:#ec4899;border:1px solid #ec489940}
.bm-tag-package{background:#f59e0b20;color:#f59e0b;border:1px solid #f59e0b40}
.bm-tag-pass{background:#8b5cf620;color:#8b5cf6;border:1px solid #8b5cf640}
.bm-tag-event{background:#10b98120;color:#10b981;border:1px solid #10b98140}
.bm-tag-update{background:#7c3aed20;color:#7c3aed;border:1px solid #7c3aed40}
.bm-tag-conversion{background:#06b6d420;color:#06b6d4;border:1px solid #06b6d440}
.bm-insight{font-size:.82rem;color:#94a3b8;line-height:1.5;padding-top:4px;border-top:1px solid #25255530}
.bm-insight b{color:#e2e8f0}
.bm-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin:12px 0}
.bm-sum-card{background:#141432;border:1px solid #252555;border-radius:8px;padding:12px;text-align:center}
.bm-sum-card .num{font-size:1.4rem;font-weight:700;color:#06b6d4}
.bm-sum-card .lbl{font-size:.75rem;color:#94a3b8;margin-top:2px}

const monthlyData = {};
G.forEach(r => {
  const mk = r[0].slice(0,7);
  if (!monthlyData[mk]) monthlyData[mk] = {rev:0,days:0,newAcc:0,arppuSum:0,peak:0,peakDay:'',activePaidSum:0,activeSum:0};
  const m = monthlyData[mk];
  m.rev += r[1]; m.days++; m.newAcc += r[4]; m.arppuSum += r[5]; m.activePaidSum += r[3]; m.activeSum += r[2];
  if (r[1] > m.peak) { m.peak = r[1]; m.peakDay = r[0]; }
});

// JP monthly calculation
const jpMonthlyData = {};
J.forEach(r => {
  const mk = r[0].slice(0,7);
  if (!jpMonthlyData[mk]) jpMonthlyData[mk] = {rev:0};
  jpMonthlyData[mk].rev += r[1];
});

const monthlyRows = monthKeys.map((mk,i) => {
  const m = monthlyData[mk];
  const prevMk = i>0 ? monthKeys[i-1] : null;
  const prev = prevMk ? monthlyData[prevMk] : null;
  const jpRev = jpMonthlyData[mk] ? jpMonthlyData[mk].rev : 0;
  const jpShare = m.rev > 0 ? (jpRev/m.rev*100) : 0;
  const mom = prev ? ((m.rev - prev.rev)/prev.rev*100) : null;
  return {month:mk, ...m, avgARPPU: m.arppuSum/m.days, jpRev, jpShare, mom};
});

  html += '<div style="overflow-x:auto"><table class="insp-table"><thead><tr>' +
    '<th>日期</th><th>标签</th><th>总用户</th><th>付费用户</th><th>付费率</th><th>总充值(KRW)</th><th>ARPPU(KRW)</th><th>平均游玩</th><th>鲸鱼数</th>' +
    '</tr></thead><tbody>';

  inspections.forEach((d,i) => {
    const cls = i>0 && d.total_users > inspections[i-1].total_users ? 'insp-up' : (i>0 ? 'insp-down' : '');
    html += '<tr>' +
      '<td>'+d.date+'</td>' +
      '<td style="text-align:left;font-size:.7rem">'+d.label+'</td>' +
      '<td>'+d.total_users.toLocaleString()+'</td>' +
      '<td>'+d.paid_users.toLocaleString()+'</td>' +
      '<td style="color:#00d4ff;font-weight:600">'+d.pay_rate+'%</td>' +
      '<td>'+fmtKRW(d.total_krw)+'</td>' +
      '<td>'+(d.arppu_krw/10000).toFixed(1)+'万</td>' +
      '<td>'+d.avg_playtime_hrs+'h</td>' +
      '<td style="color:#f59e0b;font-weight:600">'+d.pay_tiers['고래'].toLocaleString()+'</td>' +
      '</tr>';
  });
  html += '</tbody></table></div>';

  // Tier trend table + chart side by side
  html += '<h2 style="margin-top:16px">📊 付费阶层趋势</h2>';
  html += '<div class="tier-trend">';

  // Tier distribution table
  html += '<div style="overflow-x:auto"><table class="insp-table"><thead><tr><th>日期</th>';
  ['未付费','低付费','中付费','高付费','超高付费','鲸鱼'].forEach(t => { html += '<th>'+t+'</th>'; });
  html += '</tr></thead><tbody>';
  inspections.forEach(d => {
    html += '<tr><td style="font-size:.7rem">'+d.date.slice(5)+'</td>';
    ['무과금','소과금','중과금','고과금','초고과금','고래'].forEach(t => {
      html += '<td>'+d.pay_tiers[t].toLocaleString()+'</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  // Chart canvas
  html += '<div class="chart-wrap" style="margin-bottom:0"><canvas id="inspTierChart" height="200"></canvas></div>';

  html += '</div>'; // close tier-trend

  // Line chart for trends
  html += '<h2 style="margin-top:16px">📈 用户·ARPPU 趋势图表</h2>';
  html += '<div class="chart-wrap"><canvas id="inspTrendChart" height="120"></canvas></div>';

  html += '</div>'; // close insp-section

  document.getElementById('inspectionTrend').innerHTML = html;

  // ===== Charts =====
  const labels = inspections.map(d => d.date.slice(5));
  const tierNames = ['未付费','低付费','中付费','高付费','超高付费','鲸鱼'];
  const tierKeys = ['무과금','소과금','중과금','고과금','초고과금','고래'];
  const tierColors = ['#94a3b8','#06b6d4','#10b981','#f59e0b','#ec4899','#7c3aed'];

  // Stacked bar for pay tiers
  new Chart(document.getElementById('inspTierChart'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: tierNames.map((name, i) => ({
        label: name,
        data: inspections.map(d => d.pay_tiers[tierKeys[i]]),
        backgroundColor: tierColors[i] + '90',
        borderColor: tierColors[i],
        borderWidth: 1
      }))
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: '#a0a0c0', font: { size: 10 } } }
      },
      scales: {
        x: { stacked: true, ticks: { color: '#a0a0c0', font: { size: 10 } }, grid: { color: '#25255530' } },
        y: { stacked: true, ticks: { color: '#a0a0c0', font: { size: 10 }, callback: function(v){ return (v/1000)+'K'; } }, grid: { color: '#25255530' } }
      }
    }
  });

  // Line chart: total_users, paid_users, ARPPU
  new Chart(document.getElementById('inspTrendChart'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: '总用户',
          data: inspections.map(d => d.total_users),
          borderColor: '#00d4ff',
          backgroundColor: '#00d4ff20',
          yAxisID: 'y',
          tension: 0.3,
          pointRadius: 4
        },
        {
          label: '付费用户',
          data: inspections.map(d => d.paid_users),
          borderColor: '#10b981',
          backgroundColor: '#10b98120',
          yAxisID: 'y',
          tension: 0.3,
          pointRadius: 4
        },
        {
          label: 'ARPPU (KRW)',
          data: inspections.map(d => d.arppu_krw),
          borderColor: '#f59e0b',
          backgroundColor: '#f59e0b20',
          yAxisID: 'y1',
          tension: 0.3,
          pointRadius: 4,
          borderDash: [5,3]
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#a0a0c0', font: { size: 10 } } }
      },
      scales: {
        x: { ticks: { color: '#a0a0c0', font: { size: 10 } }, grid: { color: '#25255530' } },
        y: {
          position: 'left',
          ticks: { color: '#a0a0c0', font: { size: 10 }, callback: function(v){ return (v/1000)+'K'; } },
          grid: { color: '#25255530' },
          title: { display: true, text: 'Users', color: '#a0a0c0', font: { size: 10 } }
        },
        y1: {
          position: 'right',
          ticks: { color: '#f59e0b', font: { size: 10 }, callback: function(v){ return (v/10000).toFixed(0)+'万'; } },
          grid: { drawOnChartArea: false },
          title: { display: true, text: 'ARPPU (KRW)', color: '#f59e0b', font: { size: 10 } }
        }
      }
    }
  });
})();
</script>
</body>
</html>
